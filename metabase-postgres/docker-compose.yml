services:
  metabase:
    image: metabase/metabase:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase_user
      MB_DB_PASS: super_secure_metabase_password
      MB_DB_HOST: metabase-db
    depends_on:
      - metabase-db
    networks:
      - metabase_network

  metabase-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metabase_user
      POSTGRES_PASSWORD: super_secure_metabase_password
      POSTGRES_DB: metabaseappdb
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - metabase_network

volumes:
  pgdata:
    driver: local

networks:
  metabase_network:
    driver: bridge
